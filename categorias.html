<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías - TierraMia</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#2E7D32', secondary: '#8D6E63', accent: '#FF6F00' },
          fontFamily: { display: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="flex flex-col min-h-screen">
  
  <!-- Header -->
  <div id="header-placeholder"></div>
  <noscript>
    <header class="header">
      <div class="container">
        <a href="index.html" class="logo">
          <div class="logo-icon">🌿</div>
          <span>TierraMia</span>
        </a>
        <nav>
          <a href="index.html">Inicio</a>
          <a href="catalogo.html">Catálogo</a>
          <a href="categorias.html">Categorías</a>
        </nav>
      </div>
    </header>
  </noscript>

  <!-- Main Content -->
  <main class="flex-1" style="background: var(--color-bg);">
    <div class="container py-8">
      
      <!-- Page Header -->
      <div class="mb-8">
        <h1 class="font-display text-3xl mb-2">Categorías</h1>
        <p class="text-secondary">Explora todas nuestras categorías de productos colombianos</p>
      </div>

      <!-- Categories Grid -->
      <div id="categories-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full loading"><div class="spinner"></div></div>
      </div>

      <!-- Featured Products by Category -->
      <div id="featured-by-category" class="mt-16">
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2025 TierraMia. Todos los derechos reservados. 🇨🇴</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/header.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Obtener emoji por slug
    function getCategoryEmoji(slug) {
      const emojis = {
        'artesanias': '🏺',
        'alimentos': '🍫',
        'bebidas': '☕',
        'textiles': '🧣',
        'joyeria': '💎',
        'ceramica': '🏺',
        'madera': '🪵',
        'cesteria': '🧺',
        'ruanas': '🧣',
        'hamacas': '🏖️',
        'bolsos': '👜',
        'sombreros': '🎩',
        'mantas': '🛋️',
        'dulces': '🍬',
        'frutos-secos': '🥜',
        'especias': '🌶️',
        'cafe': '☕',
        'cacao': '🍫',
        'jugos': '🧃',
        'collares': '📿',
        'pulseras': '⌚',
        'aretes': '✨'
      };
      return emojis[slug] || '📦';
    }

    // Cargar categorías
    async function loadCategories() {
      const container = document.getElementById('categories-container');
      
      try {
        const response = await api.getCategories({ rootOnly: true });
        const categories = response.data || [];
        
        if (categories.length > 0) {
          container.innerHTML = categories.map(cat => `
            <div class="card p-6 hover:shadow-lg transition-all" style="cursor: pointer;" onclick="window.location.href = 'catalogo?category=${cat.id}'">
              <div class="flex items-start gap-4">
                <div class="text-5xl">${getCategoryEmoji(cat.slug)}</div>
                <div class="flex-1">
                  <h3 class="font-display text-xl mb-2">${cat.name}</h3>
                  <p class="text-secondary text-sm mb-3">${cat.description || 'Explora productos de esta categoría'}</p>
                  <div class="flex items-center justify-between">
                    <span class="badge badge-success">${cat.productCount || 0} productos</span>
                    ${cat.subcategories && cat.subcategories.length > 0 
                      ? `<span class="text-xs text-secondary">+${cat.subcategories.length} subcategorías</span>`
                      : ''}
                  </div>
                </div>
              </div>
              
              ${cat.subcategories && cat.subcategories.length > 0 ? `
                <div class="mt-4 pt-4 border-t" style="border-color: #E0E0E0;">
                  <p class="text-xs text-secondary mb-2">Subcategorías:</p>
                  <div class="flex flex-wrap gap-2">
                    ${cat.subcategories.slice(0, 4).map(sub => `
                      <span class="text-xs px-2 py-1 rounded" style="background: var(--color-bg-warm);">
                        ${getCategoryEmoji(sub.slug)} ${sub.name}
                      </span>
                    `).join('')}
                    ${cat.subcategories.length > 4 ? `<span class="text-xs text-secondary">+${cat.subcategories.length - 4} más</span>` : ''}
                  </div>
                </div>
              ` : ''}
            </div>
          `).join('');
        } else {
          container.innerHTML = `
            <div class="col-span-full empty-state">
              <div class="empty-state-icon">📂</div>
              <h3 class="empty-state-title">Sin categorías</h3>
              <p>No hay categorías disponibles</p>
            </div>
          `;
        }
      } catch (error) {
        console.error('Error cargando categorías:', error);
        container.innerHTML = `
          <div class="col-span-full empty-state">
            <div class="empty-state-icon">⚠️</div>
            <h3 class="empty-state-title">Error al cargar</h3>
            <p>No se pudieron cargar las categorías</p>
            <button onclick="loadCategories()" class="btn btn-primary mt-4">Reintentar</button>
          </div>
        `;
      }
    }

    // Cargar productos destacados por categoría
    async function loadFeaturedByCategory() {
      const container = document.getElementById('featured-by-category');
      
      try {
        // Obtener categorías raíz con productos
        const response = await api.getCategories({ rootOnly: true });
        const categories = response.data || [];
        
        // Filtrar solo categorías con subcategorías o productos
        const mainCategories = categories.filter(c => c.subcategories && c.subcategories.length > 0).slice(0, 2);
        
        if (mainCategories.length === 0) {
          container.innerHTML = '';
          return;
        }

        let html = '';
        
        for (const cat of mainCategories) {
          try {
            const productsRes = await api.getProducts({ categoryId: cat.id, page: 1, size: 4 });
            const products = productsRes.data?.products || [];
            
            if (products.length > 0) {
              html += `
                <div class="mb-12">
                  <div class="flex items-center justify-between mb-6">
                    <div>
                      <h2 class="font-display text-2xl">${getCategoryEmoji(cat.slug)} ${cat.name}</h2>
                      <p class="text-secondary">Los mejores productos de esta categoría</p>
                    </div>
                    <a href="catalogo.html?category=${cat.id}" class="btn btn-outline btn-sm">
                      Ver todos →
                    </a>
                  </div>
                  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    ${products.map(p => renderProductCard(p)).join('')}
                  </div>
                </div>
              `;
            }
          } catch (e) {
            console.log(`Error cargando productos para ${cat.name}:`, e);
          }
        }
        
        if (html) {
          container.innerHTML = `
            <div class="section-header" style="text-align: left; margin-bottom: 2rem;">
              <h2 class="section-title">Productos por Categoría</h2>
              <p class="section-subtitle">Explora lo mejor de cada categoría</p>
            </div>
            ${html}
          `;
        }
      } catch (error) {
        console.error('Error cargando productos por categoría:', error);
      }
    }

    // Inicializar
    document.addEventListener('DOMContentLoaded', async () => {
      await renderHeader();
      await loadCategories();
      loadFeaturedByCategory();
    });
  </script>
</body>
</html>
